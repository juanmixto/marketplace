# Maintenance page — serves a static 503 with Retry-After.
# No upstream, no scripts, no external assets. Designed to keep working
# when everything else is down. Issue #1253.

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # Don't log PII paths during an incident.
  access_log off;
  error_log /dev/stderr warn;

  root /usr/share/nginx/html;

  # Serve the static HTML body but force 503 status + Retry-After.
  error_page 503 /index.html;

  # Cheap container-side healthcheck (not exposed via traefik).
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    add_header Retry-After 300 always;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex" always;
    return 503;
  }
}
