<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>En mantenimiento — Raíz Directa</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #faf7f2;
        color: #2a2520;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        line-height: 1.5;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1815; color: #e8e2d6; }
      }
      main {
        max-width: 30rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 1rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }
      .lang {
        margin-top: 2rem;
        opacity: 0.7;
        font-size: 0.875rem;
      }
      hr {
        border: 0;
        border-top: 1px solid currentColor;
        opacity: 0.15;
        margin: 1.5rem 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Estamos en mantenimiento</h1>
      <p>Volvemos en unos minutos. Gracias por la paciencia.</p>
      <hr />
      <h1 lang="en">We&rsquo;re under maintenance</h1>
      <p lang="en">Back in a few minutes. Thanks for your patience.</p>
      <p class="lang">Raíz Directa</p>
    </main>
  </body>
</html>
