# PostgreSQL 16 overrides for production primary
#
# Append the relevant lines into the running postgresql.conf — DO NOT replace
# the file. The container image ships sane defaults for everything else.
#
# Apply procedure:
#   1. Copy these lines into <pgdata>/postgresql.conf (under "# CUSTOM" header).
#   2. docker compose -f docker-compose.prod.yml restart db
#   3. Validate:
#      docker exec marketplace_db psql -U postgres -c \
#        "SELECT name, setting FROM pg_settings \
#         WHERE name IN ('archive_mode','wal_level','archive_timeout','max_wal_senders','wal_keep_size','hot_standby');"
#
# Refs: docs/runbooks/db-backup.md, issue #1006

# --- WAL / archiving -------------------------------------------------------
wal_level = replica                 # required for archive_mode + replication
archive_mode = on                   # ship every closed WAL segment to repo1
archive_command = 'pgbackrest --stanza=marketplace archive-push %p'
archive_timeout = 60                # force WAL switch every 60s → RPO ≤ 1 min

# --- Replication slots / standby (Phase 1 wire-up) -------------------------
max_wal_senders = 3                 # primary + 1 standby + headroom
wal_keep_size = 1GB                 # cushion if standby falls behind briefly
hot_standby = on                    # also applied on the standby node

# --- Safety ----------------------------------------------------------------
# pgBackRest reads the datadir directly; no further tuning is required here.
# If you see "WAL archive failed" repeatedly in logs, check:
#   - /var/spool/pgbackrest disk usage (archive-async queue)
#   - B2 reachability (rclone lsd b2-mp:mp-pgbackrest-eu)
