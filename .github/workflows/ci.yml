name: CI

on:
  push:
    branches:
      - main
    paths-ignore: &ci_paths_ignore
      # Markdown-only changes don't affect runtime. NOTE: a few audits
      # do read docs (e.g. scripts/audit-p1-observability.mjs reads
      # docs/runbooks/payment-incidents.md). A docs-only PR that breaks
      # those scopes will land without CI catching it; the next
      # code-touching PR will fail the audit. Accepted trade-off —
      # mirrors the prior `push` behaviour.
      - '**/*.md'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    # Same ignore list as `push` so a doc-only PR doesn't trigger the
    # full pipeline (Verify + Build + 4× E2E shards). YAML anchor keeps
    # the two lists in sync.
    paths-ignore: *ci_paths_ignore
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
  AUTH_SECRET: ci-secret-please-change
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  PAYMENT_PROVIDER: mock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Lint + audit + typecheck + tests (parallel)
        # github.{event_name,ref} are runner-provided and not strictly
        # user-controllable, but interpolating any `github.*` context
        # directly into a shell `run:` block is flagged by semgrep
        # (yaml.github-actions.security.run-shell-injection) as a
        # defense-in-depth issue. Route through `env:` so the shell
        # only ever sees a plain variable.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
        run: |
          set +e
          mkdir -p .ci-logs
          npm run lint             > .ci-logs/lint.log             2>&1 & PID_LINT=$!
          npm run audit:contracts  > .ci-logs/audit-contracts.log  2>&1 & PID_AUDIT=$!
          npm run audit:flags-cleanup > .ci-logs/audit-flags.log   2>&1 & PID_AUDIT_FLAGS=$!
          npm run audit:fk         > .ci-logs/audit-fk.log         2>&1 & PID_AUDIT_FK=$!
          npm run audit:findMany   > .ci-logs/audit-findmany.log   2>&1 & PID_AUDIT_FM=$!
          npm run audit:image-sizes > .ci-logs/audit-image-sizes.log 2>&1 & PID_AUDIT_IMG=$!
          npm run audit:app-env    > .ci-logs/audit-app-env.log    2>&1 & PID_AUDIT_APP_ENV=$!
          npm run audit:admin-roles > .ci-logs/audit-admin-roles.log 2>&1 & PID_AUDIT_ADMIN_ROLES=$!
          npm run audit:string-no-max > .ci-logs/audit-string-no-max.log 2>&1 & PID_AUDIT_STR_NO_MAX=$!
          npm run audit:webhook-cast > .ci-logs/audit-webhook-cast.log 2>&1 & PID_AUDIT_WH_CAST=$!
          npm run audit:prisma-update-spread > .ci-logs/audit-prisma-update-spread.log 2>&1 & PID_AUDIT_PRISMA_SPREAD=$!
          npm run audit:form-number-coerce > .ci-logs/audit-form-number-coerce.log 2>&1 & PID_AUDIT_FORM_NUM=$!
          npm run audit:no-root-env > .ci-logs/audit-no-root-env.log 2>&1 & PID_AUDIT_NO_ROOT_ENV=$!
          npm run typecheck:app    > .ci-logs/typecheck-app.log    2>&1 & PID_TC_APP=$!
          npm run typecheck:test   > .ci-logs/typecheck-test.log   2>&1 & PID_TC_TEST=$!
          if [ "$GH_EVENT_NAME" = "push" ] && [ "$GH_REF" = "refs/heads/main" ]; then
            npm run test:coverage > .ci-logs/tests.log 2>&1 & PID_TESTS=$!
          else
            npm run test:parallel > .ci-logs/tests.log 2>&1 & PID_TESTS=$!
          fi

          STATUS=0
          wait $PID_LINT    || { echo "::group::lint FAILED";             cat .ci-logs/lint.log;             echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT   || { echo "::group::audit:contracts FAILED";  cat .ci-logs/audit-contracts.log;  echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_FLAGS || { echo "::group::audit:flags-cleanup FAILED"; cat .ci-logs/audit-flags.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_FK || { echo "::group::audit:fk FAILED";        cat .ci-logs/audit-fk.log;         echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_FM || { echo "::group::audit:findMany FAILED";  cat .ci-logs/audit-findmany.log;   echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_IMG || { echo "::group::audit:image-sizes FAILED"; cat .ci-logs/audit-image-sizes.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_APP_ENV || { echo "::group::audit:app-env FAILED"; cat .ci-logs/audit-app-env.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_ADMIN_ROLES || { echo "::group::audit:admin-roles FAILED"; cat .ci-logs/audit-admin-roles.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_STR_NO_MAX || { echo "::group::audit:string-no-max FAILED"; cat .ci-logs/audit-string-no-max.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_WH_CAST || { echo "::group::audit:webhook-cast FAILED"; cat .ci-logs/audit-webhook-cast.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_PRISMA_SPREAD || { echo "::group::audit:prisma-update-spread FAILED"; cat .ci-logs/audit-prisma-update-spread.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_FORM_NUM || { echo "::group::audit:form-number-coerce FAILED"; cat .ci-logs/audit-form-number-coerce.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_AUDIT_NO_ROOT_ENV || { echo "::group::audit:no-root-env FAILED"; cat .ci-logs/audit-no-root-env.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_TC_APP  || { echo "::group::typecheck:app FAILED";    cat .ci-logs/typecheck-app.log;    echo "::endgroup::"; STATUS=1; }
          wait $PID_TC_TEST || { echo "::group::typecheck:test FAILED";   cat .ci-logs/typecheck-test.log;   echo "::endgroup::"; STATUS=1; }
          wait $PID_TESTS   || { echo "::group::tests FAILED";            cat .ci-logs/tests.log;            echo "::endgroup::"; STATUS=1; }

          if [ $STATUS -eq 0 ]; then
            echo "::group::lint";            cat .ci-logs/lint.log;             echo "::endgroup::"
            echo "::group::audit:contracts"; cat .ci-logs/audit-contracts.log;  echo "::endgroup::"
            echo "::group::audit:flags-cleanup"; cat .ci-logs/audit-flags.log;   echo "::endgroup::"
            echo "::group::audit:fk";        cat .ci-logs/audit-fk.log;         echo "::endgroup::"
            echo "::group::audit:findMany";  cat .ci-logs/audit-findmany.log;   echo "::endgroup::"
            echo "::group::audit:image-sizes"; cat .ci-logs/audit-image-sizes.log; echo "::endgroup::"
            echo "::group::audit:app-env";   cat .ci-logs/audit-app-env.log;    echo "::endgroup::"
            echo "::group::audit:admin-roles"; cat .ci-logs/audit-admin-roles.log; echo "::endgroup::"
            echo "::group::audit:string-no-max"; cat .ci-logs/audit-string-no-max.log; echo "::endgroup::"
            echo "::group::audit:webhook-cast"; cat .ci-logs/audit-webhook-cast.log; echo "::endgroup::"
            echo "::group::audit:prisma-update-spread"; cat .ci-logs/audit-prisma-update-spread.log; echo "::endgroup::"
            echo "::group::audit:form-number-coerce"; cat .ci-logs/audit-form-number-coerce.log; echo "::endgroup::"
            echo "::group::audit:no-root-env"; cat .ci-logs/audit-no-root-env.log; echo "::endgroup::"
            echo "::group::typecheck:app";   cat .ci-logs/typecheck-app.log;    echo "::endgroup::"
            echo "::group::typecheck:test";  cat .ci-logs/typecheck-test.log;   echo "::endgroup::"
            echo "::group::tests";           cat .ci-logs/tests.log;            echo "::endgroup::"
          fi
          exit $STATUS

      - uses: actions/upload-artifact@v6
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  build:
    name: Build And Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'next.config.ts') }}
          restore-keys: |
            nextcache-${{ runner.os }}-

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Check schema.prisma ↔ applied DB are in sync (#313)
        # After migrate deploy, the CI DB is the ground truth for what the
        # migrations directory declares. Compare that against schema.prisma.
        # Exit 2 means schema.prisma declares something the migrations did
        # NOT apply (field added but no migration file, or removed unique
        # index still in schema, etc.) — the exact class of drift that
        # surfaced the P2022 bug behind #307 and drove this gate.
        # Works without a shadow DB because `--from-config-datasource` uses
        # the live post-deploy DB, not the migrations folder.
        run: |
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --exit-code

      - name: Build
        run: npm run build

  integration-shard:
    name: Integration shard ${{ matrix.shard }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      DATABASE_URL_TEST: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      TEST_SHARD_INDEX: ${{ matrix.shard }}
      TEST_SHARD_TOTAL: "8"

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Apply migrations to test DB
        run: npx prisma migrate deploy

      # NOTE: no seed step. Integration tests truncate the DB in a
      # top-level `beforeEach` (see test/integration/helpers.ts) so
      # any global seed data would be wiped before the first test
      # ever runs. Skipping saves ~5-8s per shard.

      - name: Integration tests (shard ${{ matrix.shard }} of 8)
        run: npm run test:integration
        timeout-minutes: 10

  integration:
    name: Integration
    # `if: always()` runs the aggregator even when matrix shards
    # failed, so we can FAIL it explicitly. Without this, GitHub
    # marks the job as SKIPPED on shard failure, and branch
    # protection treats SKIPPED as neutral — letting broken PRs
    # merge silently. See `e2e-smoke-complete` below for the same
    # pattern; #1037 + #1040 merged with red shards under the old
    # SKIPPED-behaviour before this fix landed.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: integration-shard
    # Aggregates the matrix shards into a single status check that
    # branch protection can require by its stable name. Each shard
    # runs on its own postgres service with a disjoint subset of test
    # files (see scripts/run-integration-tests.mjs TEST_SHARD_*).
    steps:
      - if: needs.integration-shard.result != 'success'
        run: |
          echo "::error::Integration aggregator failed: shards did not all succeed (result=${{ needs.integration-shard.result }})"
          exit 1
      - run: echo "All integration shards passed"

  e2e-smoke:
    name: E2E Smoke (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # PRs: bail on first shard failure to free runners for the queue.
      # Push to main keeps fail-fast on too — a red shard there means
      # something already merged broke; running the rest only delays the
      # signal and burns runner-time we need for the next PR's CI.
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    # Runs in parallel with verify/build/integration against `next dev`.
    # Playwright's native --shard splits specs across runners.
    # Prod-mode coverage (`next start` + DYNAMIC_SERVER_USAGE etc.) runs
    # in nightly.yml — a run with PLAYWRIGHT_USE_PROD=1 took ~11 min on
    # GitHub-hosted runners, which makes it unacceptable for every PR.
    # The playwright.config.ts env switch (#383) stays wired up so
    # local developers and nightly can still opt into the prod server.
    # Blocking required check — see docs/ci-testing-strategy.md §6.

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      DATABASE_URL_TEST: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      - name: Create .env for seed script
        run: |
          echo "DATABASE_URL=$DATABASE_URL_TEST" > .env
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env
          echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
          echo "PAYMENT_PROVIDER=$PAYMENT_PROVIDER" >> .env

      - name: Seed database
        run: npm run db:seed

      - name: Run E2E smoke suite (shard ${{ matrix.shard }}/4)
        # DISABLE_LOGIN_RATELIMIT=1 exempts the suite from the
        # (IP+email) login throttle from #592. CI shares a single
        # seeded credential and easily exhausts the bucket within a
        # run; the route guard only honours the flag when
        # NODE_ENV !== 'production', so a prod deploy cannot bypass
        # the limit even if this env leaks into another workflow.
        run: npx playwright test --grep @smoke --workers=1 --shard=${{ matrix.shard }}/4
        env:
          DISABLE_LOGIN_RATELIMIT: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ github.sha }}-shard${{ matrix.shard }}
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

  e2e-smoke-complete:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: e2e-smoke
    # `if: always()` + explicit shard-result check is mandatory:
    # without it, a single shard failure makes GitHub mark this
    # aggregator as SKIPPED, and branch protection treats SKIPPED
    # as neutral — so PRs with red shards merge silently. #1037
    # (multi-vendor-cart shard 6 red) and #1040 (shards 5+6 red)
    # both reached `main` under the old SKIPPED-behaviour before
    # this fix landed; the resulting broken `main` is what
    # surfaced the bug.
    if: always()
    # Aggregates the matrix shards into a single status check that
    # branch protection can require by its stable name.
    steps:
      - if: needs.e2e-smoke.result != 'success'
        run: |
          echo "::error::E2E Smoke aggregator failed: shards did not all succeed (result=${{ needs.e2e-smoke.result }})"
          exit 1
      - run: echo "All E2E smoke shards passed"
