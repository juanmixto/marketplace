name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
  AUTH_SECRET: ci-secret-please-change
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  PAYMENT_PROVIDER: mock

jobs:
  quality:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck app
        run: npm run typecheck:app

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Coverage
        run: npm run test:coverage
        timeout-minutes: 5

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn

  build:
    name: Build And Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [quality, build]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      DATABASE_URL_TEST: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB-backed tests
        run: npm run test:db

      - name: Create .env for seed script
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env
          echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
          echo "PAYMENT_PROVIDER=$PAYMENT_PROVIDER" >> .env

      - name: Seed database
        run: npm run db:seed

      - name: Integration tests
        run: npm run test:integration
        timeout-minutes: 10
