name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
  AUTH_SECRET: ci-secret-please-change
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  PAYMENT_PROVIDER: mock

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Typecheck + tests (parallel)
        run: |
          set +e
          mkdir -p .ci-logs
          npm run typecheck:app  > .ci-logs/typecheck-app.log  2>&1 & PID_TC_APP=$!
          npm run typecheck:test > .ci-logs/typecheck-test.log 2>&1 & PID_TC_TEST=$!
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npm run test:coverage > .ci-logs/tests.log 2>&1 & PID_TESTS=$!
          else
            npm run test:parallel > .ci-logs/tests.log 2>&1 & PID_TESTS=$!
          fi

          STATUS=0
          wait $PID_TC_APP  || { echo "::group::typecheck:app FAILED";  cat .ci-logs/typecheck-app.log;  echo "::endgroup::"; STATUS=1; }
          wait $PID_TC_TEST || { echo "::group::typecheck:test FAILED"; cat .ci-logs/typecheck-test.log; echo "::endgroup::"; STATUS=1; }
          wait $PID_TESTS   || { echo "::group::tests FAILED";          cat .ci-logs/tests.log;          echo "::endgroup::"; STATUS=1; }

          if [ $STATUS -eq 0 ]; then
            echo "::group::typecheck:app";  cat .ci-logs/typecheck-app.log;  echo "::endgroup::"
            echo "::group::typecheck:test"; cat .ci-logs/typecheck-test.log; echo "::endgroup::"
            echo "::group::tests";          cat .ci-logs/tests.log;          echo "::endgroup::"
          fi
          exit $STATUS

      - uses: actions/upload-artifact@v6
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  build:
    name: Build And Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      DATABASE_URL_TEST: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Apply migrations to test DB
        run: npm run test:db:parallel

      - name: Create .env for seed script
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env
          echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
          echo "PAYMENT_PROVIDER=$PAYMENT_PROVIDER" >> .env

      - name: Seed database
        run: npm run db:seed

      - name: Integration tests
        run: npm run test:integration
        timeout-minutes: 10

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Runs in parallel with verify/build/integration. Uses `next dev` via
    # Playwright's webServer — no dependency on the build job.
    # Promoted to a blocking required check after 4 consecutive green
    # runs on main (see docs/ci-testing-strategy.md §6).

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test
      DATABASE_URL_TEST: postgresql://mp_user:mp_pass@localhost:5432/marketplace_test

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deps

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      - name: Create .env for seed script
        run: |
          echo "DATABASE_URL=$DATABASE_URL_TEST" > .env
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env
          echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
          echo "PAYMENT_PROVIDER=$PAYMENT_PROVIDER" >> .env

      - name: Seed database
        run: npm run db:seed

      - name: Run E2E smoke suite
        run: npm run test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore
