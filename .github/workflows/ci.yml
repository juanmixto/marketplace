name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint & Type checking (fast, no dependencies)
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn

  # Job 2: Build check (can run in parallel with quality)
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

  # Job 3: Integration tests (depends on both quality and build)
  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [quality, build]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Wait for PostgreSQL
        run: npx wait-port 5432

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Run integration tests
        run: npm run test:integration || true
