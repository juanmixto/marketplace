name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage
            coverage/lcov.info
          if-no-files-found: error

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
