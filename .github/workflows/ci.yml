name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
      AUTH_SECRET: ci-secret-please-change
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
