name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://mp_user:mp_pass@localhost:5432/marketplace
  AUTH_SECRET: ci-secret-please-change
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  PAYMENT_PROVIDER: mock

jobs:
  # Corre en paralelo con `build`
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: |
          FILES=$(ls test/*.test.ts | grep -vE "email-verification|gdpr-compliance|settlement-calculation|stock-availability|stock-concurrency" | tr '\n' ' ')
          node --import tsx --test --test-timeout=10000 $FILES
        timeout-minutes: 5

      - name: Coverage
        run: |
          FILES=$(ls test/*.test.ts | grep -vE "email-verification|gdpr-compliance|settlement-calculation|stock-availability|stock-concurrency" | tr '\n' ' ')
          c8 node --import tsx --test --test-timeout=10000 $FILES
        timeout-minutes: 5

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn

  # Corre en paralelo con `quality`
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # Solo corre si quality y build pasan
  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [quality, build]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: mp_user
          POSTGRES_PASSWORD: mp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp_user -d marketplace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Integration tests
        run: npm run test:integration
        timeout-minutes: 10
        continue-on-error: true
