name: Auto-update PR branches

# Branch protection on `main` requires PRs be up-to-date before merge.
# GitHub does NOT auto-rebase PRs when main moves, so a PR with
# auto-merge enabled silently rots in `BEHIND` until someone clicks
# "Update branch". The 2026-04-29 audit found 6 PRs stuck like this
# for ~12h — the same root cause that kept main red across 30+
# pushes (each fix was waiting on a manual rebase before it could
# merge).
#
# This workflow closes that gap: every push to main + a 30 min safety
# poll, list every open PR with auto-merge on and BEHIND state, then
# trigger update-branch (the same call as the UI button). No-op for
# PRs that don't need it. Conflicts that can't auto-resolve still
# require human attention; we just stop hand-clicking the button.

on:
  push:
    branches:
      - main
  schedule:
    # Every 30 min as a backup in case the push trigger missed (very
    # rare — workflow_run cancellations, GitHub outages). Cheap.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Serialize so two simultaneous main pushes don't fight each other
  # over the same PR. Cancel-in-progress is OFF: we want every push
  # to fan out at least once.
  group: auto-update-pr-branches
  cancel-in-progress: false

jobs:
  update:
    name: Update auto-merge PR branches
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update every BEHIND auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # `auto_merge != null` filters to PRs the author/maintainer
          # already opted into auto-merging. We never touch a PR that
          # someone hasn't explicitly armed — that would be hostile to
          # in-progress work the author hasn't finished.
          #
          # --repo is required: without it, `gh pr list` falls back to
          # `git remote -v` to discover the repo, and this job runs
          # without `actions/checkout` so there is no .git. The fallback
          # silently fails ("fatal: not a git repository") and gh returns
          # an empty list, making the workflow report "no PRs to update"
          # while every PR rots BEHIND for hours. Found 2026-05-03.
          #
          # 2026-05-04 race fix: the push trigger fires within seconds
          # of a merge, but GitHub takes 30-60s to recompute every other
          # PR's mergeStateStatus from `UNKNOWN` → `BEHIND`. The first
          # pass after a merge therefore sees an empty list — every PR
          # is still UNKNOWN. Two mitigations:
          #   1. Include `UNKNOWN` in the filter. update-branch on an
          #      UNKNOWN PR is safe: if it's actually up-to-date, the
          #      API returns 422 which we already log + ignore.
          #   2. Run TWO passes with a 45s gap. The second catches the
          #      stragglers that hadn't recomputed yet during pass 1.
          # Without this, BEHIND PRs would silently rot until the 30-min
          # cron — exactly the symptom the user hit on 2026-05-04 #1237.

          do_pass() {
            local label="$1"
            mapfile -t prs < <(
              gh pr list \
                --repo "${GITHUB_REPOSITORY}" \
                --state open \
                --limit 100 \
                --json number,mergeStateStatus,autoMergeRequest \
                --jq '.[]
                       | select(.autoMergeRequest != null
                                and (.mergeStateStatus == "BEHIND"
                                     or .mergeStateStatus == "UNKNOWN"))
                       | .number'
            )

            if [ ${#prs[@]} -eq 0 ]; then
              echo "[$label] No BEHIND/UNKNOWN auto-merge PRs to update."
              return 0
            fi

            echo "[$label] Found ${#prs[@]} candidate PR(s): ${prs[*]}"

            for n in "${prs[@]}"; do
              echo "::group::[$label] PR #$n"
              # update-branch returns 202 + a message body when accepted,
              # 422 when the PR cannot be updated (merge conflict, no
              # diff, draft against a branch with no fast-forward path,
              # etc.). We log and keep going — one PR's conflict shouldn't
              # block the rest of the queue, and a 422 on UNKNOWN simply
              # means "already up-to-date, nothing to do".
              if gh api -X PUT "/repos/${GITHUB_REPOSITORY}/pulls/$n/update-branch" 2>&1; then
                echo "PR #$n: update-branch dispatched"
              else
                echo "PR #$n: update-branch returned non-200 (already up-to-date or merge conflict)"
              fi
              echo "::endgroup::"
            done
          }

          do_pass "pass-1"
          # Sleep just past the typical mergeStateStatus-recompute window
          # so pass-2 sees the post-merge BEHIND state instead of UNKNOWN.
          # 45s + workflow overhead lands ~75s after the trigger — well
          # under the 5-min job timeout and under the prompt-cache TTL
          # for any humans watching.
          sleep 45
          do_pass "pass-2"
