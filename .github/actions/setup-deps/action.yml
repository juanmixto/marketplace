name: Setup deps
description: Restore node_modules + Prisma client from cache, install only on miss.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        # Node 24 kills the Node-20 deprecation warnings GitHub has been
        # printing against actions/cache@v4 (forced upgrade on June 2nd)
        # and lets the integration runner use the stable
        # `--test-isolation=none` flag instead of the experimental alias.
        node-version: 24
        cache: npm

    - name: Restore node_modules + generated Prisma client cache
      id: cache
      uses: actions/cache@v4
      with:
        # Prisma's generator writes to `src/generated/prisma` (see
        # prisma/schema.prisma `generator client.output`), NOT into
        # node_modules. Cache both paths together, keyed on
        # package-lock + schema.prisma, so skipping the generate
        # step on a cache hit is safe. Node version is part of the
        # key because native modules (e.g. Prisma engines) are ABI-
        # compatible per major.
        path: |
          node_modules
          src/generated/prisma
        key: deps-${{ runner.os }}-node24-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      # `--include=dev` forces dev dependencies even when a workflow
      # sets `NODE_ENV=production` at the job level (doctor.yml does,
      # to match real runtime). Without this flag, tsx/prisma/eslint
      # are skipped and the seed + typecheck steps fail the moment
      # the cache misses (e.g. on any schema.prisma change that bumps
      # the cache key).
      run: npm ci --include=dev --prefer-offline --no-audit

    - name: Generate Prisma client
      # Skip on cache hit — the cached `src/generated/prisma` is
      # already keyed on the current schema.prisma.
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx prisma generate
