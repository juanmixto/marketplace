<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark brown outer circle/badge -->
  <circle cx="256" cy="256" r="256" fill="#5C4033"/>

  <!-- Cream/off-white background -->
  <circle cx="256" cy="256" r="245" fill="#FFFDF8"/>

  <!-- Soil/earth layers (bottom) -->
  <ellipse cx="256" cy="380" rx="180" ry="90" fill="#6B5344"/>
  <ellipse cx="256" cy="375" rx="180" ry="80" fill="#8B7355"/>

  <!-- Cream/beige soil highlights -->
  <path d="M 120 360 Q 180 370 240 365 Q 280 362 320 370 Q 360 375 400 365"
        fill="none" stroke="#F5E6D3" stroke-width="12" stroke-linecap="round"/>
  <path d="M 110 390 Q 170 405 240 400 Q 300 396 360 405 Q 400 410 420 400"
        fill="none" stroke="#F5E6D3" stroke-width="10" stroke-linecap="round"/>

  <!-- Plant stem -->
  <path d="M 256 320 Q 250 280 245 240 Q 240 200 240 160"
        stroke="#7A9B7F" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 256 280 Q 265 260 280 240 Q 295 220 305 200"
        stroke="#7A9B7F" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 256 240 Q 240 210 230 180 Q 220 150 215 120"
        stroke="#7A9B7F" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left leaves -->
  <ellipse cx="200" cy="200" rx="35" ry="55" fill="#7A9B7F"
           transform="rotate(-45 200 200)"/>
  <ellipse cx="195" cy="235" rx="28" ry="48" fill="#7A9B7F"
           transform="rotate(-60 195 235)"/>

  <!-- Right leaves -->
  <ellipse cx="312" cy="165" rx="38" ry="60" fill="#7A9B7F"
           transform="rotate(25 312 165)"/>
  <ellipse cx="310" cy="220" rx="32" ry="52" fill="#7A9B7F"
           transform="rotate(45 310 220)"/>

  <!-- Leaf highlights/veins (cream color) -->
  <ellipse cx="205" cy="205" rx="12" ry="28" fill="#FFFDF8" opacity="0.6"
           transform="rotate(-45 205 205)"/>
  <ellipse cx="200" cy="240" rx="10" ry="22" fill="#FFFDF8" opacity="0.6"
           transform="rotate(-60 200 240)"/>
  <ellipse cx="315" cy="170" rx="13" ry="30" fill="#FFFDF8" opacity="0.6"
           transform="rotate(25 315 170)"/>
  <ellipse cx="315" cy="225" rx="11" ry="25" fill="#FFFDF8" opacity="0.6"
           transform="rotate(45 315 225)"/>
</svg>
