<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="28" fill="#22C55E"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#0F766E" stroke-width="2"/>

  <!-- Stylized leaf/plant -->
  <g transform="translate(32, 28)">
    <!-- Leaf shape -->
    <path d="M 0 -8 Q 4 -2 4 4 L 0 8 L -4 4 Q -4 -2 0 -8" fill="#FFFDF8" stroke="#0F766E" stroke-width="0.5"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#0F766E" stroke-width="0.5"/>
  </g>

  <!-- Stem -->
  <rect x="30" y="34" width="4" height="12" fill="#0F766E"/>
</svg>
