<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark green outer circle for maximum contrast -->
  <circle cx="50" cy="50" r="50" fill="#0F766E"/>

  <!-- Bright green inner circle -->
  <circle cx="50" cy="50" r="45" fill="#22C55E"/>

  <!-- Bold white leaf (simplified, thick strokes) -->
  <g>
    <!-- Leaf body -->
    <path d="M 50 15 Q 65 30 65 50 Q 65 70 50 80 Q 35 70 35 50 Q 35 30 50 15 Z"
          fill="#FFFDF8" stroke="none"/>
    <!-- Bold center vein -->
    <line x1="50" y1="15" x2="50" y2="80" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Bold stem -->
  <rect x="45" y="78" width="10" height="15" fill="#0F766E" rx="2"/>
</svg>
