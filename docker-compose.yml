services:
  db:
    image: postgres:16-alpine
    container_name: marketplace_db
    environment:
      POSTGRES_USER: mp_user
      POSTGRES_PASSWORD: mp_pass
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - marketplace_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp_user -d marketplace"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  marketplace_db_data:
